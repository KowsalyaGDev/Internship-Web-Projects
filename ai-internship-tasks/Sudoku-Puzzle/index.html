<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Meta tags for character encoding and responsive design -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku Puzzle Generator</title>
    <!-- Link to external CSS file -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Main container for the entire application -->
    <div class="container">
        <!-- Header section with title -->
        <header class="header">
            <h1>Sudoku Puzzle Generator</h1>
            <p class="subtitle">Solve the 9x9 Sudoku puzzle</p>
        </header>

        <!-- Main content area -->
        <main class="main-content">
            <!-- Buttons section for user interactions -->
            <div class="button-group">
                <button id="newPuzzleBtn" class="btn btn-primary">Generate New Puzzle</button>
                <button id="checkSolutionBtn" class="btn btn-success">Check Solution</button>
                <button id="clearPuzzleBtn" class="btn btn-secondary">Clear All</button>
            </div>

            <!-- Message area to display feedback -->
            <div id="messageArea" class="message-area"></div>

            <!-- The Sudoku grid container -->
            <div class="sudoku-grid" id="sudokuGrid">
                <!-- Grid cells will be generated by JavaScript -->
            </div>
        </main>

        <!-- Footer section -->
        <footer class="footer">
            <p>Fill in the empty cells with numbers 1-9. Each row, column, and 3x3 box must contain all digits 1-9.</p>
        </footer>
    </div>

    <!-- Link to external JavaScript file -->
    <script src="script.js"></script>
</body>
</html>
